<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sketch</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
  </head>

  <body>
    <!-- 海草 HTML 結構 -->
    <div class="seaweed-container">
      <div class="seaweed"></div>
      <div class="seaweed" style="height: 120px; animation-delay: -1s;"></div>
      <div class="seaweed"></div>
      <div class="seaweed" style="height: 200px; animation-delay: -0.5s;"></div>
      <div class="seaweed"></div>
      <div class="seaweed" style="height: 180px;"></div>
      <div class="seaweed"></div>
      <div class="seaweed" style="height: 130px; animation-delay: -2s;"></div>
    </div>
    <script src="sketch.js"></script>
  </body>
</html>
